overview: |
  個人事業主が業績記録をスマホから手軽に管理するツール。
  Google カレンダーとスプレッドシートに同時反映される仕組みを
  Google Apps Script のみで構築し、月額コスト0円で運用可能。
problem:
  - "既存の業績管理ツールは月額制で個人事業主には高い"
  - "スマホで素早く入力できるシンプルなツールが少ない"
  - "カレンダーとスプシを手動で同期する手間が継続を阻害"
solution: |
  Google Workspace のみで完結する業績管理ツールを開発。
  スマホ最適化UIで30秒以内に記録可能、GASのトリガーで
  カレンダーとスプシに自動同期。
features:
  - "ワンタップで業績記録（30秒以内の入力）"
  - "Googleカレンダーと双方向同期"
  - "月次/年次の集計ダッシュボード"
  - "ミニカレンダーUIを外部ライブラリゼロで自作"
results: |
  月額コスト $0、実装18.5時間、要件定義v4.0.1でQA 100/100達成。
  19 Issue 全て完了、約1,200行のコード規模で動作。

